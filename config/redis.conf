# =============================================================
#  Redis Configuration — ThreatHunter Pro
# =============================================================

# Network
bind 0.0.0.0
port 6379
protected-mode no

# Memory
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence (for alert dedup state)
save 900 1
save 300 10
save 60 10000

appendonly yes
appendfilename "threathunter.aof"
appendfsync everysec

# Performance
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Logging
loglevel notice
logfile ""
